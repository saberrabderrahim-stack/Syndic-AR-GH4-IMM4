<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syndic - Andalous Al Rahma 4</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .accordion-open .accordion-content {
            max-height: 2500px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4 bg-slate-900">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-xl font-bold text-center text-slate-900 mb-6">Syndic Application</h1>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="username" placeholder="Identifiant" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                <input type="password" id="password" placeholder="Mot de passe" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                <div id="login-error" class="text-red-500 text-xs hidden text-center bg-red-50 p-2 rounded-lg">Identifiants incorrects.</div>
                <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl shadow-lg">Se connecter</button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b border-slate-200 h-14 flex items-center justify-between px-6 sticky top-0 z-50 shadow-sm">
            <div class="flex items-center space-x-2">
                <span class="bg-blue-600 text-white px-2 py-1 rounded-lg text-sm font-bold">AR4</span>
                <span class="text-sm font-bold text-slate-800">Andalous Al Rahma 4 - Grp 4 - Imb 4</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-xs font-semibold bg-slate-100 px-2.5 py-1 rounded-md"><i class="fa-solid fa-user mr-1 text-blue-600"></i>asaber</span>
                <button onclick="handleLogout()" class="text-slate-400 hover:text-red-600"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-4 space-y-4">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                    <div>
                        <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Total Cotisations (المداخيل)</p>
                        <h3 id="dash-total-incomes" class="text-xl font-bold text-emerald-600 mt-1">0.00 DH</h3>
                    </div>
                    <div class="bg-emerald-50 p-3 rounded-lg text-emerald-600"><i class="fa-solid fa-wallet text-xl"></i></div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                    <div>
                        <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Total Dépenses (المصاريف)</p>
                        <h3 id="dash-total-expenses" class="text-xl font-bold text-rose-600 mt-1">0.00 DH</h3>
                    </div>
                    <div class="bg-rose-50 p-3 rounded-lg text-rose-600"><i class="fa-solid fa-receipt text-xl"></i></div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                    <div>
                        <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Solde de la Caisse (الرصيد الصافي)</p>
                        <h3 id="dash-balance" class="text-xl font-bold text-blue-600 mt-1">0.00 DH</h3>
                    </div>
                    <div class="bg-blue-50 p-3 rounded-lg text-blue-600"><i class="fa-solid fa-scale-balanced text-xl"></i></div>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 justify-end bg-white p-2 rounded-xl border border-slate-200 shadow-sm">
                <label class="cursor-pointer bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold px-3 py-2 rounded-lg flex items-center shadow-sm">
                    <i class="fa-solid fa-file-excel mr-1.5"></i> Charger EXCEL
                    <input type="file" id="import-excel" class="hidden" accept=".xlsx" onchange="importFromExcel(event)">
                </label>
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold px-3 py-2 rounded-lg shadow-sm"><i class="fa-solid fa-download mr-1.5"></i>Télécharger EXCEL</button>
                <button onclick="generatePDFReport()" class="bg-rose-600 hover:bg-rose-700 text-white text-xs font-semibold px-3 py-2 rounded-lg shadow-sm"><i class="fa-solid fa-file-pdf mr-1.5"></i>Générer PDF Pro</button>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden accordion-item" id="sec-cotisations">
                <button onclick="toggleAccordion('sec-cotisations')" class="w-full flex items-center justify-between p-4 font-bold text-left bg-slate-50 hover:bg-slate-100/50 transition-colors text-slate-800 border-b border-slate-200">
                    <span class="flex items-center text-sm"><i class="fa-solid fa-hand-holding-dollar text-emerald-600 mr-2"></i>PAGE I : Gestion des Cotisations (المداخيل المباشرة)</span>
                    <div class="flex items-center space-x-4" onclick="event.stopPropagation()">
                        <select id="matrix-year" class="text-xs bg-white border border-slate-300 rounded p-1 font-normal" onchange="renderIncomesTable()">
                            <option value="2024">2024</option><option value="2025">2025</option>
                            <option value="2026" selected>2026</option><option value="2027">2027</option>
                        </select>
                        <i class="fa-solid fa-chevron-down text-slate-400 btn-arrow"></i>
                    </div>
                </button>
                <div class="accordion-content bg-white p-4 space-y-4">
                    <form id="income-form" onsubmit="saveIncome(event)" class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                        <input type="hidden" id="income-edit-appt" value="-1">
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="w-48">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Sélectionner l'Appartement</label>
                                <select id="inc-appt" required class="w-full bg-white border border-slate-200 rounded-lg p-2 text-xs focus:outline-none"></select>
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Sélectionner les mois payés (نقاط اختيار الشهور المستلمة)</label>
                                <div class="flex flex-wrap gap-2 mt-1" id="dots-months-container">
                                    </div>
                            </div>
                            <div class="w-32 pt-5">
                                <button type="submit" id="btn-sub-inc" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xs py-2.5 rounded-lg transition-all"><i class="fa-solid fa-check mr-1"></i>Enregistrer</button>
                            </div>
                        </div>
                    </form>

                    <div class="overflow-x-auto border border-slate-200 rounded-xl text-[11px]">
                        <table class="w-full text-left border-collapse" id="table-incomes">
                            <thead class="bg-slate-100 font-bold border-b border-slate-200 text-slate-700 uppercase">
                                <tr id="table-inc-head"></tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 text-slate-600"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden accordion-item" id="sec-depenses">
                <button onclick="toggleAccordion('sec-depenses')" class="w-full flex items-center justify-between p-4 font-bold text-left bg-slate-50 hover:bg-slate-100/50 transition-colors text-slate-800 border-b border-slate-200">
                    <span class="flex items-center text-sm"><i class="fa-solid fa-receipt text-rose-600 mr-2"></i>PAGE II : Registre des Dépenses (المصاريف)</span>
                    <i class="fa-solid fa-chevron-down text-slate-400 btn-arrow"></i>
                </button>
                <div class="accordion-content bg-white p-4 space-y-4">
                    <form id="expense-form" onsubmit="saveExpense(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <input type="hidden" id="expense-edit-index" value="-1">
                        <div class="space-y-2 col-span-1 md:col-span-3 grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase">Mois</label>
                                <select id="exp-month" required class="w-full bg-white border border-slate-200 rounded-lg p-2 text-xs focus:outline-none"></select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase">Année</label>
                                <select id="exp-year" required class="w-full bg-white border border-slate-200 rounded-lg p-2 text-xs focus:outline-none"></select>
                            </div>
                        </div>
                        <div class="space-y-2 col-span-1 md:col-span-3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2" id="services-container"></div>
                        <div class="p-3 bg-amber-50 border border-amber-200 rounded-lg col-span-1 md:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-2">
                            <label class="block text-[10px] font-bold text-amber-800 uppercase sm:col-span-3">Charges Exceptionnelles</label>
                            <input type="text" id="exp-spec-type" placeholder="Nature" class="sm:col-span-2 bg-white border border-slate-200 rounded-lg p-2 text-xs">
                            <input type="number" id="exp-spec-amt" placeholder="Montant DH" class="bg-white border border-slate-200 rounded-lg p-2 text-xs text-right">
                        </div>
                        <div class="flex items-end col-span-1">
                            <button type="submit" id="btn-sub-exp" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-semibold text-xs py-2.5 rounded-lg transition-all"><i class="fa-solid fa-check mr-1"></i>Enregistrer</button>
                        </div>
                    </form>

                    <div class="overflow-x-auto border border-slate-200 rounded-xl text-[11px]">
                        <table class="w-full text-left border-collapse" id="table-expenses">
                            <thead class="bg-slate-100 font-bold text-slate-700 uppercase">
                                <tr>
                                    <th class="p-2.5">Période</th>
                                    <th class="p-2.5">Détails Services Fixes</th>
                                    <th class="p-2.5">Exceptionnels</th>
                                    <th class="p-2.5 text-right">Total Mensuel</th>
                                    <th class="p-2.5 text-center w-28">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const MONTHS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        const SERVICES_KEYS = [
            { id: "elec", label: "Électricité" },
            { id: "clean", label: "Nettoyage" },
            { id: "prod", label: "Produits" },
            { id: "ext", label: "Balayage" }
        ];
        
        // Comprehensive Core Memory Bank Store
        let db = { incomes: {}, expenses: [] };

        document.addEventListener("DOMContentLoaded", () => {
            initAppUI();
            checkAndBuildYearDatabase();
            renderIncomesTable();
            updateStatsAndTables();
        });

        function initAppUI() {
            const incAppt = document.getElementById("inc-appt");
            for(let i=1; i<=25; i++) incAppt.innerHTML += `<option value="${i}">Appartement ${i}</option>`;
            
            const expM = document.getElementById("exp-month");
            MONTHS.forEach(m => expM.innerHTML += `<option value="${m}">${m}</option>`);

            const expY = document.getElementById("exp-year");
            [2024, 2025, 2026, 2027].forEach(y => expY.innerHTML += `<option value="${y}">${y}</option>`);

            // Build Selection Dots Form
            const dotsContainer = document.getElementById("dots-months-container");
            MONTHS.forEach((m, idx) => {
                dotsContainer.innerHTML += `
                    <label class="inline-flex items-center bg-white border border-slate-200 px-2 py-1 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors select-none">
                        <input type="checkbox" value="${idx}" class="form-dot-chk rounded text-blue-600 mr-1 h-3.5 w-3.5">
                        <span class="text-xs font-medium">${m.substring(0,3)}.</span>
                    </label>
                `;
            });

            // Build dynamic income table header
            const hRow = document.getElementById("table-inc-head");
            hRow.innerHTML = '<th class="p-2.5">Désignation</th>';
            MONTHS.forEach(m => hRow.innerHTML += `<th class="p-2.5 text-center">${m.substring(0,4)}.</th>`);
            hRow.innerHTML += '<th class="p-2.5 text-right">Total Payé</th><th class="p-2.5 text-center">Actions</th>';

            const srvContainer = document.getElementById("services-container");
            SERVICES_KEYS.forEach(s => {
                srvContainer.innerHTML += `
                    <div class="flex items-center justify-between p-2 bg-white border border-slate-200 rounded-lg shadow-sm">
                        <label class="inline-flex items-center text-[11px] font-medium text-slate-700 cursor-pointer">
                            <input type="checkbox" id="chk-${s.id}" class="rounded border-slate-300 text-blue-600 mr-1.5 h-3.5 w-3.5" onchange="document.getElementById('amt-${s.id}').disabled = !this.checked"> ${s.label}
                        </label>
                        <input type="number" id="amt-${s.id}" disabled placeholder="DH" class="w-16 bg-slate-50 border border-slate-200 rounded p-1 text-right text-xs">
                    </div>
                `;
            });
        }

        function checkAndBuildYearDatabase() {
            const yr = document.getElementById("matrix-year").value;
            if(!db.incomes[yr]) {
                db.incomes[yr] = {};
                for(let i=1; i<=25; i++) {
                    db.incomes[yr][i] = Array(12).fill(null); // null = Non saisi (futur)
                }
            }
        }

        // --- TIME ENGINE COMPLIANCE ---
        function getMonthStatus(apptValue, monthIdx, selectedYear) {
            const now = new Date(); // Dynamic operational reference context (June 2026)
            const currentYear = now.getFullYear();
            const currentMonthIdx = now.getMonth();

            if (apptValue === 50) return { label: "50.00 DH", color: "text-emerald-600 font-bold" };

            // Future evaluations engine checks
            if (selectedYear > currentYear || (selectedYear === currentYear && monthIdx > currentMonthIdx)) {
                return { label: "-", color: "text-slate-300 text-center" };
            }
            return { label: "0.00 DH", color: "text-amber-600 font-medium" };
        }

        // --- PAGE I : CORE LOGIC FOR INCOME ---
        function saveIncome(e) {
            e.preventDefault();
            checkAndBuildYearDatabase();
            const yr = document.getElementById("matrix-year").value;
            const appt = parseInt(document.getElementById("inc-appt").value);
            
            // Gather selected month indexes from input checkboxes
            let selectedMonths = [];
            document.querySelectorAll(".form-dot-chk:checked").forEach(chk => {
                selectedMonths.push(parseInt(chk.value));
            });

            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonthIdx = now.getMonth();

            // Loop 12 months to automatically set status
            for(let mIdx=0; mIdx<12; mIdx++) {
                if(selectedMonths.includes(mIdx)) {
                    db.incomes[yr][appt][mIdx] = 50;
                } else {
                    // Past or current month becomes 0, future months remain untouched (null)
                    if(parseInt(yr) < currentYear || (parseInt(yr) === currentYear && mIdx <= currentMonthIdx)) {
                        db.incomes[yr][appt][mIdx] = 0;
                    } else {
                        db.incomes[yr][appt][mIdx] = null;
                    }
                }
            }

            updateStatsAndTables();
            renderIncomesTable();
            document.getElementById("income-form").reset();
            document.getElementById("income-edit-appt").value = "-1";
            document.getElementById("btn-sub-inc").innerHTML = '<i class="fa-solid fa-check mr-1"></i>Enregistrer';
        }

        function editIncome(appt) {
            checkAndBuildYearDatabase();
            const yr = document.getElementById("matrix-year").value;
            document.getElementById("inc-appt").value = appt;
            document.getElementById("income-edit-appt").value = appt;
            
            // Re-check input checkboxes based on values array
            document.querySelectorAll(".form-dot-chk").forEach((chk, mIdx) => {
                chk.checked = db.incomes[yr][appt][mIdx] === 50;
            });

            document.getElementById("btn-sub-inc").innerHTML = '<i class="fa-solid fa-arrows-rotate mr-1"></i>Modifier';
            toggleAccordion('sec-cotisations');
        }

        function deleteIncome(appt) {
            if(confirm(`Voulez-vous réinitialiser l'historique de l'appartement ${appt} pour cette année ?`)) {
                const yr = document.getElementById("matrix-year").value;
                db.incomes[yr][appt] = Array(12).fill(null);
                updateStatsAndTables();
                renderIncomesTable();
            }
        }

        function renderIncomesTable() {
            checkAndBuildYearDatabase();
            const yr = document.getElementById("matrix-year").value;
            const tbody = document.querySelector("#table-incomes tbody");
            tbody.innerHTML = "";

            for(let app=1; app<=25; app++) {
                let rowSum = 0;
                let rowHTML = `<tr class="hover:bg-slate-50/50">
                    <td class="p-2.5 font-bold text-slate-900">Appartement ${app}</td>`;

                for(let mIdx=0; mIdx<12; mIdx++) {
                    let val = db.incomes[yr][app][mIdx];
                    if(val === 50) rowSum += 50;
                    let status = getMonthStatus(val, mIdx, parseInt(yr));
                    rowHTML += `<td class="p-2.5 text-center ${status.color}">${status.label}</td>`;
                }

                rowHTML += `
                    <td class="p-2.5 text-right font-bold text-blue-600">${rowSum.toFixed(2)} DH</td>
                    <td class="p-2.5 text-center space-x-2">
                        <button onclick="editIncome(${app})" class="text-blue-500 hover:text-blue-700 text-xs" title="Modifier"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteIncome(${app})" class="text-red-400 hover:text-red-600 text-xs" title="Vider"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>`;
                tbody.innerHTML += rowHTML;
            }
        }

        // --- PAGE II : EXPENSES ---
        function saveExpense(e) {
            e.preventDefault();
            const month = document.getElementById("exp-month").value;
            const year = parseInt(document.getElementById("exp-year").value);
            const editIdx = parseInt(document.getElementById("expense-edit-index").value);

            let services = {};
            SERVICES_KEYS.forEach(s => {
                services[s.id] = document.getElementById(`chk-${s.id}`).checked ? (parseFloat(document.getElementById(`amt-${s.id}`).value) || 0) : 0;
            });

            let special = {
                type: document.getElementById("exp-spec-type").value || "Aucun",
                amt: parseFloat(document.getElementById("exp-spec-amt").value) || 0
            };

            let total = Object.values(services).reduce((a,b)=>a+b,0) + special.amt;
            let record = { month, year, services, special, total };

            if(editIdx === -1) db.expenses.push(record);
            else { db.expenses[editIdx] = record; document.getElementById("expense-edit-index").value = "-1"; }
            
            updateStatsAndTables();
            document.getElementById("expense-form").reset();
            SERVICES_KEYS.forEach(s => document.getElementById(`amt-${s.id}`).disabled = true);
        }

        function editExpense(idx) {
            let ex = db.expenses[idx];
            document.getElementById("exp-month").value = ex.month;
            document.getElementById("exp-year").value = ex.year;
            SERVICES_KEYS.forEach(s => {
                let val = ex.services[s.id];
                document.getElementById(`chk-${s.id}`).checked = val > 0;
                document.getElementById(`amt-${s.id}`).disabled = val === 0;
                document.getElementById(`amt-${s.id}`).value = val > 0 ? val : '';
            });
            document.getElementById("exp-spec-type").value = ex.special.type;
            document.getElementById("exp-spec-amt").value = ex.special.amt > 0 ? ex.special.amt : '';
            document.getElementById("expense-edit-index").value = idx;
            toggleAccordion('sec-depenses');
        }

        function deleteExpense(idx) { if(confirm("Supprimer ce frais ?")) { db.expenses.splice(idx, 1); updateStatsAndTables(); } }

        // --- REFRESH STATISTICS ENGINE ---
        function updateStatsAndTables() {
            let totalIn = 0;
            Object.values(db.incomes).forEach(yearObj => {
                Object.values(yearObj).forEach(arr => {
                    arr.forEach(v => { if(v === 50) totalIn += 50; });
                });
            });
            let totalOut = db.expenses.reduce((sum, item) => sum + item.total, 0);
            
            document.getElementById("dash-total-incomes").innerText = `${totalIn.toFixed(2)} DH`;
            document.getElementById("dash-total-expenses").innerText = `${totalOut.toFixed(2)} DH`;
            document.getElementById("dash-balance").innerText = `${(totalIn - totalOut).toFixed(2)} DH`;

            // Render Expenses Table
            const tbodyExp = document.querySelector("#table-expenses tbody");
            tbodyExp.innerHTML = "";
            db.expenses.forEach((e, idx) => {
                let details = Object.entries(e.services).map(([k,v]) => `${k}:${v}DH`).join(' | ');
                tbodyExp.innerHTML += `<tr>
                    <td class="p-2.5 font-bold text-slate-900">${e.month} ${e.year}</td>
                    <td class="p-2.5 text-slate-500">${details}</td>
                    <td class="p-2.5 text-slate-400">${e.special.amt} DH (${e.special.type})</td>
                    <td class="p-2.5 text-right font-bold text-rose-600">${e.total.toFixed(2)} DH</td>
                    <td class="p-2.5 text-center space-x-2">
                        <button onclick="editExpense(${idx})" class="text-blue-500 hover:text-blue-700 text-xs"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteExpense(${idx})" class="text-red-400 hover:text-red-600 text-xs"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>`;
            });
        }

        function toggleAccordion(id) {
            const item = document.getElementById(id);
            const isOpen = item.classList.contains("accordion-open");
            document.querySelectorAll(".accordion-item").forEach(el => { el.classList.remove("accordion-open"); });
            if (!isOpen) item.classList.add("accordion-open");
        }

        function handleLogin(e) {
            e.preventDefault();
            if(document.getElementById("username").value === "asaber" && document.getElementById("password").value === "Al@e16Lokmn23") {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("app-screen").classList.remove("hidden");
                toggleAccordion('sec-cotisations');
            } else { document.getElementById("login-error").classList.remove("hidden"); }
        }
        function handleLogout() { document.getElementById("app-screen").classList.add("hidden"); document.getElementById("login-screen").classList.remove("hidden"); }

        // ================= CONFORMAL FILE EXPORTS (EXCEL COMPLIANCE) =================
        function exportToExcel() {
            let wb = XLSX.utils.book_new();
            const yr = document.getElementById("matrix-year").value;

            // Strict Header layout specifications mapping requirements
            let aoaData = [
                [`SOCIETE COPROPRIETE ANDALOUS AL RAHMA GR 4 IM 4 - ANNEE ${yr}`],
                ["Appartement (A)", ...MONTHS, "Total Annuel (DH)"]
            ];

            let monthlySums = Array(12).fill(0);

            for(let app=1; app<=25; app++) {
                let row = [`Appartement ${app}`];
                let appSum = 0;
                for(let mIdx=0; mIdx<12; mIdx++) {
                    let val = db.incomes[yr][app][mIdx];
                    if(val === 50) {
                        row.push(50.00); appSum += 50; monthlySums[mIdx] += 50;
                    } else if(val === 0) {
                        row.push(0.00);
                    } else {
                        row.push("-");
                    }
                }
                row.push(appSum);
                aoaData.push(row);
            }
            aoaData.push(["Total Mensuel", ...monthlySums, monthlySums.reduce((a,b)=>a+b,0)]);

            let ws = XLSX.utils.aoa_to_sheet(aoaData);
            XLSX.utils.book_append_sheet(wb, ws, `Cotisations ${yr}`);
            XLSX.writeFile(wb, `Registre_Syndic_Andalous4_${yr}.xlsx`);
        }

        // ================= PROFESSIONAL PDF REPORTING ENGINE (WITH COLORS) =================
        function generatePDFReport() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF('l', 'mm', 'a4'); // Landscape for 12 months spreadsheet formatting
            const yr = document.getElementById("matrix-year").value;

            // Clean corporate top ribbon branding bar
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 297, 18, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(12); doc.setFont("Helvetica", "bold");
            doc.text(`ANDALOUS AL RAHMA 4 - CAISSE DU SYNDIC (ANNEE ${yr})`, 12, 11);

            // Document Content Meta Description
            doc.setTextColor(15, 23, 42); doc.setFontSize(10);
            doc.text("PAGE I : SUIVI DE VENTILATION DES COTISATIONS MENSUELLES DIRECTES", 12, 26);

            let pdfHeaders = ["Appartement", ...MONTHS.map(m=>m.substring(0,4)+'.'), "Total (DH)"];
            let pdfRows = [];
            let monthlySums = Array(12).fill(0);

            for(let app=1; app<=25; app++) {
                let row = [`Appartement ${app}`];
                let appSum = 0;
                for(let mIdx=0; mIdx<12; mIdx++) {
                    let val = db.incomes[yr][app][mIdx];
                    if(val === 50) { row.push("50,00"); appSum += 50; monthlySums[mIdx] += 50; }
                    else if(val === 0) { row.push("00,00"); }
                    else { row.push("-"); }
                }
                row.push(`${appSum.toFixed(2)} DH`);
                pdfRows.push(row);
            }
            // Push bottom sums row
            pdfRows.push(["Total Mensuel", ...monthlySums.map(v=>`${v.toFixed(2)} DH`), `${monthlySums.reduce((a,b)=>a+b,0).toFixed(2)} DH`]);

            doc.autoTable({
                startY: 30,
                head: [pdfHeaders],
                body: pdfRows,
                styles: { fontSize: 7, cellPadding: 1.5, alignment: 'center' },
                headStyles: { fillColor: [37, 99, 235] },
                theme: 'grid',
                didParseCell: function(data) {
                    // Styles logic processing block execution
                    if (data.row.index === pdfRows.length - 1) {
                        data.cell.styles.fontStyle = 'bold';
                        data.cell.styles.fillColor = [241, 245, 249];
                        return;
                    }
                    
                    // Extract row total string to confirm 0.00 DH total annual default
                    let totalStr = pdfRows[data.row.index][13];
                    if(totalStr === "0.00 DH") {
                        // Light pastel red background for non-contributing total annual defaults
                        data.cell.styles.fillColor = [254, 226, 226]; 
                        data.cell.styles.textColor = [153, 27, 27];
                        return;
                    }

                    let txt = data.cell.text[0];
                    if(txt === "50,00") {
                        data.cell.styles.fillColor = [220, 252, 231]; // Light green pastel
                        data.cell.styles.textColor = [21, 128, 61];
                        data.cell.styles.fontStyle = 'bold';
                    } else if(txt === "00,00") {
                        data.cell.styles.fillColor = [255, 237, 213]; // Light orange pastel
                        data.cell.styles.textColor = [194, 65, 12];
                    }
                }
            });

            // Page II : Expenses Log Rendering
            doc.addPage();
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 297, 18, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(12);
            doc.text(`ANDALOUS AL RAHMA 4 - CAISSE DU SYNDIC (ANNEE ${yr})`, 12, 11);
            
            doc.setTextColor(15, 23, 42); doc.setFontSize(10);
            doc.text("PAGE II : REGISTRE DE COMPTABILITE DES CHARGES & DEPENSES EFFECTIVES", 12, 26);

            let expRows = db.expenses.filter(e => e.year == yr).map(e => {
                let details = `Elec: ${e.services.elec}DH | Prods: ${e.services.products}DH | Nettoyage: ${e.services.clean}DH`;
                return [`${e.month} ${e.year}`, details, `${e.special.amt} DH (${e.special.type})`, `${e.total.toFixed(2)} DH`];
            });

            doc.autoTable({
                startY: 30,
                head: [['Période Comptable', 'Ventilation Charges Fixes', 'Frais Exceptionnels (Nature)', 'Total Dépensé (DH)']],
                body: expRows.length > 0 ? expRows : [["Aucun frais enregistré pour cette année", "-", "-", "0.00 DH"]],
                headStyles: { fillColor: [225, 29, 72] }, theme: 'striped'
            });

            doc.save(`Rapport_Syndic_Andalous4_${yr}.pdf`);
        }

        // ================= REVERSE INGESTION INTERACTION =================
        function importFromExcel(e) {
            let file = e.target.files[0]; if (!file) return;
            let reader = new FileReader(); reader.readAsArrayBuffer(file);
            reader.onload = function(evt) {
                try {
                    let data = new Uint8Array(evt.target.result);
                    let workbook = XLSX.read(data, { type: 'array' });
                    db.incomes = {};

                    workbook.SheetNames.forEach(sheetName => {
                        let rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1 });
                        let yr = parseInt(sheetName.replace(/[^0-9]/g, '')) || 2026;
                        if(!db.incomes[yr]) db.incomes[yr] = {};

                        for(let i=2; i<=26; i++) {
                            let r = rows[i]; if(!r) continue;
                            let appNum = parseInt(r[0].replace(/[^0-9]/g, ''));
                            if(!appNum) continue;

                            db.incomes[yr][appNum] = Array(12).fill(null);
                            for(let mIdx=0; mIdx<12; mIdx++) {
                                let cellVal = r[mIdx+1];
                                if(cellVal === 50) db.incomes[yr][appNum][mIdx] = 50;
                                else if(cellVal === 0) db.incomes[yr][appNum][mIdx] = 0;
                            }
                        }
                    });
                    renderIncomesTable(); updateStatsAndTables(); alert("Importation complétée !");
                } catch(err) { alert("Format invalide."); }
            };
        }
    </script>
