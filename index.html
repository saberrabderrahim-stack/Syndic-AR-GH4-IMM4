<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syndic - Andalous Al Rahma 4</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .matrix-checkbox:checked + label {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .accordion-open .accordion-content {
            max-height: 2500px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="login-screen" class="flex items-center justify-center min-h-screen px-4 bg-slate-900">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
            <h1 class="text-xl font-bold text-center text-slate-900 mb-6">Syndic Application</h1>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="username" placeholder="Identifiant" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                <input type="password" id="password" placeholder="Mot de passe" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                <div id="login-error" class="text-red-500 text-xs hidden text-center bg-red-50 p-2 rounded-lg">Identifiants incorrects.</div>
                <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl shadow-lg">Se connecter</button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b border-slate-200 h-14 flex items-center justify-between px-6 sticky top-0 z-50 shadow-sm">
            <div class="flex items-center space-x-2">
                <span class="bg-blue-600 text-white px-2 py-1 rounded-lg text-sm font-bold">AR4</span>
                <span class="text-sm font-bold text-slate-800">Andalous Al Rahma 4 - Grp 4 - Imb 4</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-xs font-semibold bg-slate-100 px-2.5 py-1 rounded-md"><i class="fa-solid fa-user mr-1 text-blue-600"></i>asaber</span>
                <button onclick="handleLogout()" class="text-slate-400 hover:text-red-600"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <main class="flex-1 max-w-7xl w-full mx-auto p-4 space-y-4">
            
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-4">
                <div class="flex flex-wrap gap-2 items-center justify-between border-b border-slate-100 pb-3">
                    <h3 class="text-sm font-bold text-slate-900"><i class="fa-solid fa-chart-pie text-blue-600 mr-1.5"></i>Tableau de Bord</h3>
                    <div class="flex flex-wrap gap-2">
                        <label class="cursor-pointer bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold px-3 py-2 rounded-lg flex items-center shadow-sm">
                            <i class="fa-solid fa-file-excel mr-1.5"></i> Charger fichier EXCEL
                            <input type="file" id="import-excel" class="hidden" accept=".xlsx" onchange="importFromExcel(event)">
                        </label>
                        <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold px-3 py-2 rounded-lg shadow-sm"><i class="fa-solid fa-download mr-1.5"></i>Télécharger EXCEL</button>
                        <button onclick="generatePDFReport()" class="bg-rose-600 hover:bg-rose-700 text-white text-xs font-semibold px-3 py-2 rounded-lg shadow-sm"><i class="fa-solid fa-file-pdf mr-1.5"></i>Générer PDF Pro</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                    <div class="bg-emerald-50/60 border border-emerald-100 p-3 rounded-lg">
                        <p class="text-[11px] font-semibold text-emerald-700 uppercase">Total Cotisations (Madahel)</p>
                        <p id="dash-total-incomes" class="text-lg font-bold text-emerald-900 mt-0.5">0.00 DH</p>
                    </div>
                    <div class="bg-rose-50/60 border border-rose-100 p-3 rounded-lg">
                        <p class="text-[11px] font-semibold text-rose-700 uppercase">Total Dépenses (Masarif)</p>
                        <p id="dash-total-expenses" class="text-lg font-bold text-rose-900 mt-0.5">0.00 DH</p>
                    </div>
                    <div class="bg-blue-50/60 border border-blue-100 p-3 rounded-lg">
                        <p class="text-[11px] font-semibold text-blue-700 uppercase">Solde Net de la Caisse</p>
                        <p id="dash-balance" class="text-lg font-bold text-blue-900 mt-0.5">0.00 DH</p>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden accordion-item" id="sec-cotisations">
                <button onclick="toggleAccordion('sec-cotisations')" class="w-full flex items-center justify-between p-4 font-bold text-left bg-slate-50 hover:bg-slate-100/50 transition-colors text-slate-800 border-b border-slate-200">
                    <span class="flex items-center text-sm"><i class="fa-solid fa-wallet text-emerald-600 mr-2"></i>PAGE I : Cotisations des Appartements (المداخيل المباشرة)</span>
                    <div class="flex items-center space-x-4">
                        <select id="matrix-year" class="text-xs bg-white border border-slate-300 rounded p-1 font-normal" onclick="event.stopPropagation()" onchange="renderMatrixIncomes()">
                            <option value="2024">2024</option><option value="2025">2025</option>
                            <option value="2026" selected>2026</option><option value="2027">2027</option>
                        </select>
                        <i class="fa-solid fa-chevron-down text-slate-400 btn-arrow"></i>
                    </div>
                </button>
                <div class="accordion-content bg-white">
                    <div class="p-4 space-y-4">
                        <div class="overflow-x-auto border border-slate-200 rounded-xl">
                            <table class="w-full text-center border-collapse text-[11px]" id="matrix-table">
                                <thead class="bg-slate-100 text-slate-700 uppercase font-bold border-b border-slate-200">
                                    <tr id="matrix-head-row">
                                        </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 text-slate-600" id="matrix-tbody">
                                    </tbody>
                            </table>
                        </div>
                        <div class="text-right">
                            <button onclick="saveMatrixData()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xs px-5 py-2.5 rounded-lg shadow-sm"><i class="fa-solid fa-floppy-disk mr-1.5"></i>Sauvegarder les modifications de la Grille</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden accordion-item" id="sec-depenses">
                <button onclick="toggleAccordion('sec-depenses')" class="w-full flex items-center justify-between p-4 font-bold text-left bg-slate-50 hover:bg-slate-100/50 transition-colors text-slate-800 border-b border-slate-200">
                    <span class="flex items-center text-sm"><i class="fa-solid fa-receipt text-rose-600 mr-2"></i>PAGE II : Registre & Saisie des Dépenses (المصاريف)</span>
                    <i class="fa-solid fa-chevron-down text-slate-400 btn-arrow"></i>
                </button>
                <div class="accordion-content bg-white p-4 space-y-4">
                    <form id="expense-form" onsubmit="saveExpense(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div class="space-y-2 col-span-1 md:col-span-3 grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase">Mois</label>
                                <select id="exp-month" required class="w-full bg-white border border-slate-200 rounded-lg p-2 text-xs focus:outline-none"></select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase">Année</label>
                                <select id="exp-year" required class="w-full bg-white border border-slate-200 rounded-lg p-2 text-xs focus:outline-none"></select>
                            </div>
                        </div>
                        <div class="space-y-2 col-span-1 md:col-span-3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2" id="services-container">
                            </div>
                        <div class="p-3 bg-amber-50 border border-amber-200 rounded-lg col-span-1 md:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-2">
                            <label class="block text-[10px] font-bold text-amber-800 uppercase sm:col-span-3">Charges Exceptionnelles</label>
                            <input type="text" id="exp-spec-type" placeholder="Nature" class="sm:col-span-2 bg-white border border-slate-200 rounded-lg p-2 text-xs">
                            <input type="number" id="exp-spec-amt" placeholder="Montant DH" class="bg-white border border-slate-200 rounded-lg p-2 text-xs text-right">
                        </div>
                        <div class="flex items-end col-span-1">
                            <button type="submit" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-semibold text-xs py-2.5 rounded-lg transition-all"><i class="fa-solid fa-check mr-1"></i>Enregistrer le mois</button>
                        </div>
                    </form>

                    <div class="overflow-x-auto border border-slate-200 rounded-xl text-[11px]">
                        <table class="w-full text-left border-collapse" id="table-view-expenses">
                            <thead class="bg-slate-100">
                                <tr>
                                    <th class="p-2.5">Période</th>
                                    <th class="p-2.5">Détails Services Fixes</th>
                                    <th class="p-2.5">Exceptionnels</th>
                                    <th class="p-2.5 text-right">Total Mensuel</th>
                                    <th class="p-2.5 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const MONTHS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        const SERVICES_KEYS = [
            { id: "elec", label: "Électricité" },
            { id: "clean", label: "Nettoyage" },
            { id: "prod", label: "Produits" },
            { id: "ext", label: "Balayage" }
        ];
        
        // Main Memory Storage Structure
        let db = { incomes: {}, expenses: [] };

        document.addEventListener("DOMContentLoaded", () => {
            initAppUI();
            resetDatabaseState();
            renderMatrixIncomes();
            updateStatsAndTables();
        });

        function initAppUI() {
            // Generate matrix table structural head cells
            const thr = document.getElementById("matrix-head-row");
            thr.innerHTML = '<th class="p-2.5 text-left">N° Appartement</th>';
            MONTHS.forEach(m => thr.innerHTML += `<th class="p-2.5">${m.substring(0,4)}.</th>`);
            thr.innerHTML += '<th class="p-2.5 text-right">Total (DH)</th><th class="p-2.5 text-center">Reset</th>';

            // Populate selectors
            const expM = document.getElementById("exp-month");
            MONTHS.forEach(m => expM.innerHTML += `<option value="${m}">${m}</option>`);
            const expY = document.getElementById("exp-year");
            [2024, 2025, 2026, 2027].forEach(y => expY.innerHTML += `<option value="${y}">${y}</option>`);

            const srvContainer = document.getElementById("services-container");
            SERVICES_KEYS.forEach(s => {
                srvContainer.innerHTML += `
                    <div class="flex items-center justify-between p-2 bg-white border border-slate-200 rounded-lg shadow-sm">
                        <label class="inline-flex items-center text-[11px] font-medium text-slate-700 cursor-pointer">
                            <input type="checkbox" id="chk-${s.id}" class="rounded border-slate-300 text-blue-600 mr-1.5 h-3.5 w-3.5" onchange="document.getElementById('amt-${s.id}').disabled = !this.checked"> ${s.label}
                        </label>
                        <input type="number" id="amt-${s.id}" disabled placeholder="DH" class="w-16 bg-slate-50 border border-slate-200 rounded p-1 text-right text-xs">
                    </div>
                `;
            });
        }

        function resetDatabaseState() {
            let activeYear = document.getElementById("matrix-year").value;
            if(!db.incomes[activeYear]) {
                db.incomes[activeYear] = {};
                for(let i = 1; i <= 25; i++) {
                    db.incomes[activeYear][i] = Array(12).fill(0); // 0 = non cotisé, 50 = cotisé
                }
            }
        }

        // --- RENDER MATRIX SYSTEM (PAGE I) ---
        function renderMatrixIncomes() {
            resetDatabaseState();
            const activeYear = document.getElementById("matrix-year").value;
            const tbody = document.getElementById("matrix-tbody");
            tbody.innerHTML = "";

            for (let app = 1; app <= 25; app++) {
                let rowHTML = `<tr class="hover:bg-slate-50/80">
                    <td class="p-2 text-left font-semibold text-slate-900">Appartement ${app}</td>`;
                
                let rowSum = 0;
                for (let mIdx = 0; mIdx < 12; mIdx++) {
                    let isChecked = db.incomes[activeYear][app][mIdx] === 50;
                    if(isChecked) rowSum += 50;
                    
                    rowHTML += `
                        <td class="p-2">
                            <input type="checkbox" id="cell-${app}-${mIdx}" class="matrix-checkbox hidden" ${isChecked ? 'checked' : ''} onchange="updateLiveRowSum(${app})">
                            <label for="cell-${app}-${mIdx}" class="w-5 h-5 mx-auto rounded-full border border-slate-300 block cursor-pointer flex items-center justify-center font-bold text-[9px] text-slate-400 transition-all hover:border-blue-500">
                                ${isChecked ? '✓' : '•'}
                            </label>
                        </td>`;
                }
                
                rowHTML += `
                    <td class="p-2 text-right font-bold text-emerald-600" id="row-sum-${app}">${rowSum.toFixed(2)} DH</td>
                    <td class="p-2 text-center">
                        <button onclick="clearMatrixRow(${app})" class="text-slate-400 hover:text-red-500 text-xs mx-1" title="Vider l'appartement"><i class="fa-solid fa-eraser"></i></button>
                    </td>
                </tr>`;
                tbody.innerHTML += rowHTML;
            }
        }

        function updateLiveRowSum(app) {
            let rowSum = 0;
            for(let mIdx = 0; mIdx < 12; mIdx++) {
                let chk = document.getElementById(`cell-${app}-${mIdx}`);
                let label = document.querySelector(`label[for="cell-${app}-${mIdx}"]`);
                if(chk.checked) {
                    rowSum += 50;
                    label.innerText = '✓';
                } else {
                    label.innerText = '•';
                }
            }
            document.getElementById(`row-sum-${app}`).innerText = `${rowSum.toFixed(2)} DH`;
        }

        function saveMatrixData() {
            const activeYear = document.getElementById("matrix-year").value;
            for (let app = 1; app <= 25; app++) {
                for (let mIdx = 0; mIdx < 12; mIdx++) {
                    let chk = document.getElementById(`cell-${app}-${mIdx}`);
                    db.incomes[activeYear][app][mIdx] = chk.checked ? 50 : 0;
                }
            }
            updateStatsAndTables();
            alert("La Grille des cotisations (Page I) a été enregistrée avec succès !");
        }

        function clearMatrixRow(app) {
            if(confirm(`Voulez-vous réinitialiser les cotisations de l'appartement ${app} ?`)) {
                for(let mIdx = 0; mIdx < 12; mIdx++) {
                    document.getElementById(`cell-${app}-${mIdx}`).checked = false;
                }
                updateLiveRowSum(app);
            }
        }

        // --- SECTION II: EXPENSES ENGINE ---
        function saveExpense(e) {
            e.preventDefault();
            const month = document.getElementById("exp-month").value;
            const year = parseInt(document.getElementById("exp-year").value);

            let services = {};
            SERVICES_KEYS.forEach(s => {
                services[s.id] = document.getElementById(`chk-${s.id}`).checked ? (parseFloat(document.getElementById(`amt-${s.id}`).value) || 0) : 0;
            });

            let special = {
                type: document.getElementById("exp-spec-type").value || "Aucun",
                amt: parseFloat(document.getElementById("exp-spec-amt").value) || 0
            };

            let total = Object.values(services).reduce((a,b)=>a+b,0) + special.amt;

            // Update matching index if exists or push clean entry
            let idx = db.expenses.findIndex(ex => ex.month === month && ex.year === year);
            if(idx !== -1) db.expenses[idx] = { month, year, services, special, total };
            else db.expenses.push({ month, year, services, special, total });
            
            updateStatsAndTables();
            document.getElementById("expense-form").reset();
            SERVICES_KEYS.forEach(s => document.getElementById(`amt-${s.id}`).disabled = true);
            alert("Dépenses mensuelles enregistrées.");
        }

        function editExpense(idx) {
            let ex = db.expenses[idx];
            document.getElementById("exp-month").value = ex.month;
            document.getElementById("exp-year").value = ex.year;
            
            SERVICES_KEYS.forEach(s => {
                let val = ex.services[s.id];
                document.getElementById(`chk-${s.id}`).checked = val > 0;
                document.getElementById(`amt-${s.id}`).disabled = val === 0;
                document.getElementById(`amt-${s.id}`).value = val > 0 ? val : '';
            });

            document.getElementById("exp-spec-type").value = ex.special.type;
            document.getElementById("exp-spec-amt").value = ex.special.amt > 0 ? ex.special.amt : '';
            
            toggleAccordion('sec-depenses');
        }

        function deleteExpense(idx) {
            if(confirm("Supprimer définitivement cette ligne de frais ?")) {
                db.expenses.splice(idx, 1);
                updateStatsAndTables();
            }
        }

        // --- DASHBOARD REFRESH & TOTALS CALCULATION ---
        function updateStatsAndTables() {
            // Calculate Total Income from all years stored in matrix structure
            let totalIn = 0;
            Object.values(db.incomes).forEach(yearObj => {
                Object.values(yearObj).forEach(arr => {
                    totalIn += arr.reduce((a,b)=>a+b,0);
                });
            });

            let totalOut = db.expenses.reduce((a, b) => a + b.total, 0);
            
            document.getElementById("dash-total-incomes").innerText = `${totalIn.toFixed(2)} DH`;
            document.getElementById("dash-total-expenses").innerText = `${totalOut.toFixed(2)} DH`;
            document.getElementById("dash-balance").innerText = `${(totalIn - totalOut).toFixed(2)} DH`;

            // Render Page II Table View
            const tbodyExp = document.querySelector("#table-view-expenses tbody");
            tbodyExp.innerHTML = "";
            db.expenses.sort((a,b) => b.year - a.year).forEach((e, idx) => {
                let details = Object.entries(e.services).map(([k,v]) => `${k}:${v}DH`).join(' | ');
                tbodyExp.innerHTML += `<tr>
                    <td class="p-2 font-semibold text-slate-900">${e.month} ${e.year}</td>
                    <td class="p-2 text-slate-500 max-w-[220px] truncate">${details}</td>
                    <td class="p-2 text-slate-500">${e.special.amt} DH <span class="text-[9px]">(${e.special.type})</span></td>
                    <td class="p-2 text-right font-bold text-rose-600">${e.total.toFixed(2)} DH</td>
                    <td class="p-2 text-center space-x-2">
                        <button onclick="editExpense(${idx})" class="text-blue-500 hover:text-blue-700 font-medium" title="Modifier"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteExpense(${idx})" class="text-red-400 hover:text-red-600 font-medium" title="Supprimer"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>`;
            });
        }

        // --- ACCORDION SYSTEM ---
        function toggleAccordion(id) {
            const item = document.getElementById(id);
            const isOpen = item.classList.contains("accordion-open");
            document.querySelectorAll(".accordion-item").forEach(el => {
                el.classList.remove("accordion-open");
                el.querySelector(".btn-arrow").style.transform = "rotate(0deg)";
            });
            if (!isOpen) {
                item.classList.add("accordion-open");
                item.querySelector(".btn-arrow").style.transform = "rotate(180deg)";
            }
        }

        // --- AUTHENTICATION FLOWS ---
        function handleLogin(e) {
            e.preventDefault();
            if(document.getElementById("username").value === "asaber" && document.getElementById("password").value === "Al@e16Lokmn23") {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("app-screen").classList.remove("hidden");
            } else { document.getElementById("login-error").classList.remove("hidden"); }
        }
        function handleLogout() {
            document.getElementById("app-screen").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
        }

        // ================= CONFORMAL FILE EXPORTS (EXCEL MATRIX LAYOUT) =================
        function exportToExcel() {
            let wb = XLSX.utils.book_new();
            let years = Object.keys(db.incomes);
            if(years.length === 0) years = ["2026"];

            years.forEach(yr => {
                let matrixInc = [
                    [`SOCIETE / COPROPRIETE ANDALOUS AL RAHMA GR 4 IM 4 - COTISATIONS (MADAHEL) - ANNEE ${yr}`],
                    ["N° Appartement", ...MONTHS, "Total Annuel (DH)"]
                ];

                let monthlySums = Array(12).fill(0);

                for(let app = 1; app <= 25; app++) {
                    let row = [`Appartement ${app}`];
                    let appSum = 0;
                    let valuesArray = db.incomes[yr][app] || Array(12).fill(0);

                    valuesArray.forEach((val, mIdx) => {
                        row.push(val === 50 ? 50.00 : 0.00);
                        if(val === 50) { appSum += 50.00; monthlySums[mIdx] += 50.00; }
                    });
                    row.push(appSum);
                    matrixInc.push(row);
                }
                matrixInc.push(["Total Mensuel", ...monthlySums, monthlySums.reduce((a,b)=>a+b,0)]);
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(matrixInc), `Cotisations ${yr}`);

                let matrixExp = [
                    [`COMPTABILITE ET CHARGES (MASARIF) - ANNEE ${yr}`],
                    ["Mois", "Électricité", "Nettoyage Escaliers", "Matériel Nettoyage", "Balayage Extérieur", "Exceptionnel", "Nature Exceptionnel", "Total Mensuel (DH)"]
                ];
                MONTHS.forEach(m => {
                    let ex = db.expenses.find(e => e.month === m && e.year == yr);
                    if(ex) matrixExp.push([m, ex.services.elec, ex.services.clean, ex.services.products, ex.services.exterior, ex.special.amt, ex.special.type, ex.total]);
                    else matrixExp.push([m, 0, 0, 0, 0, 0, "-", 0]);
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(matrixExp), `Masarif ${yr}`);
            });

            XLSX.writeFile(wb, "Registre_Syndic_Andalous_Al_Rahma4.xlsx");
        }

        // ================= FILE DATA INGESTION ENGINE (EXCEL UPLOAD) =================
        function importFromExcel(e) {
            let file = e.target.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.readAsArrayBuffer(file);
            reader.onload = function(evt) {
                try {
                    let data = new Uint8Array(evt.target.result);
                    let workbook = XLSX.read(data, { type: 'array' });
                    db = { incomes: {}, expenses: [] };

                    workbook.SheetNames.forEach(sheetName => {
                        let rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1 });
                        let yr = parseInt(sheetName.replace(/[^0-9]/g, '')) || 2026;

                        if(sheetName.startsWith("Cotisations")) {
                            if(!db.incomes[yr]) db.incomes[yr] = {};
                            for(let i = 2; i <= 26; i++) {
                                let r = rows[i]; if(!r) continue;
                                let appNum = parseInt(r[0].replace(/[^0-9]/g, ''));
                                if(!appNum) continue;

                                db.incomes[yr][appNum] = Array(12).fill(0);
                                MONTHS.forEach((m, mIdx) => {
                                    if(parseFloat(r[mIdx + 1]) === 50) db.incomes[yr][appNum][mIdx] = 50;
                                });
                            }
                        } else if(sheetName.startsWith("Masarif")) {
                            for(let i = 2; i < rows.length; i++) {
                                let r = rows[i]; if(!r || !MONTHS.includes(r[0])) continue;
                                db.expenses.push({
                                    month: r[0], year: yr,
                                    services: { elec: parseFloat(r[1])||0, clean: parseFloat(r[2])||0, products: parseFloat(r[3])||0, exterior: parseFloat(r[4])||0 },
                                    special: { amt: parseFloat(r[5])||0, type: r[6] || "-" },
                                    total: parseFloat(r[7])||0
                                });
                            }
                        }
                    });
                    renderMatrixIncomes();
                    updateStatsAndTables();
                    alert("Fichier Excel chargé et synchronisé !");
                } catch(err) { alert("Erreur lors de la lecture du fichier Excel."); }
            };
        }

        // ================= CONFORMAL PROFESSIONAL PDF EXPORT =================
        function generatePDFReport() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF('l', 'mm', 'a4'); // Landscape layout configuration
            
            // Header
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 297, 25, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.setFont("Helvetica", "bold");
            doc.text("ANDALOUS AL RAHMA 4 - GESTION DU SYNDIC", 15, 11);
            doc.setFontSize(9); doc.setFont("Helvetica", "normal");
            doc.text(`Rapport direct d'activité édité le : ${new Date().toLocaleDateString('fr-FR')}`, 15, 18);

            // Page 1: Cotisations
            doc.setTextColor(15, 23, 42); doc.setFontSize(11); doc.setFont("Helvetica", "bold");
            let activeYear = document.getElementById("matrix-year").value;
            doc.text(`PAGE I : MATRICE SUIVI DES COTISATIONS (ANNEE ${activeYear}) - 50.00 DH`, 15, 36);

            let pdfHeaders = ["Appartement", ...MONTHS.map(m=>m.substring(0,4)+'.'), "Total S. (DH)"];
            let pdfRows = [];

            for(let app = 1; app <= 25; app++) {
                let row = [`Appartement ${app}`];
                let appSum = 0;
                let values = db.incomes[activeYear] ? db.incomes[activeYear][app] : Array(12).fill(0);
                values.forEach(val => {
                    row.push(val === 50 ? "50.00" : "0.00");
                    appSum += val;
                });
                row.push(`${appSum.toFixed(2)} DH`);
                pdfRows.push(row);
            }

            doc.autoTable({
                startY: 40,
                head: [pdfHeaders],
                body: pdfRows,
                styles: { fontSize: 7.5, cellPadding: 1 },
                headStyles: { fillColor: [37, 99, 235] },
                theme: 'grid'
            });

            // Page 2: Expenses
            doc.addPage();
            doc.setFillColor(15, 23, 42); doc.rect(0, 0, 297, 25, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.setFont("Helvetica", "bold");
            doc.text("ANDALOUS AL RAHMA 4 - GESTION DU SYNDIC", 15, 11);
            
            doc.setTextColor(15, 23, 42); doc.setFontSize(11);
            doc.text(`PAGE II : RECAPITULATIF DES CHARGES & DEPENSES DE L'ANNEE`, 15, 36);

            let expRows = [];
            db.expenses.forEach(e => {
                let details = `Elec: ${e.services.elec}DH | Nettoyage: ${e.services.clean}DH | Produits: ${e.services.products}DH | Balayage: ${e.services.exterior}DH`;
                expRows.push([`${e.month} ${e.year}`, details, `${e.special.amt} DH (${e.special.type})`, `${e.total.toFixed(2)} DH`]);
            });

            doc.autoTable({
                startY: 40,
                head: [['Période Mensuelle', 'Ventilation des Charges Fixes', 'Frais Exceptionnels (Nature)', 'Total Mensuel (DH)']],
                body: expRows.length > 0 ? expRows : [["Aucun frais enregistré", "-", "-", "-"]],
                styles: { fontSize: 9, cellPadding: 2 },
                headStyles: { fillColor: [225, 29, 72] },
                theme: 'striped'
            });

            doc.save(`Rapport_Syndic_Immeuble4_Annee_${activeYear}.pdf`);
        }
    </script>
